# GitHub Pages config. The site is the README, rendered with a theme; the header
# banner uses the title/description below. Everything that isn't the landing page
# (Go sources, internal design docs, the skill) is excluded from the build.
title: scratch
description: A fast, keyboard-first per-worktree markdown scratchpad TUI (Go / Bubble Tea).
theme: jekyll-theme-cayman
exclude:
  - .claude/
  - docs/
  - internal/
  - "*.go"
  - go.mod
  - go.sum
  - CHANGELOG.md
